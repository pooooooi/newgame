<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monverse Battle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="pageBattle">
  <div id="passOverlay" class="passOverlay hidden">
    <div class="passCard">
      <div id="passTitle" class="passTitle">プレイヤー交代</div>
      <div id="passText" class="passText">端末を次のプレイヤーに渡してください</div>
      <button id="passReadyBtn">準備OK</button>
    </div>
  </div>
  <div class="rotateGuide" id="rotateGuide">
    <div class="rotateCard">
      <div class="rotateIcon">📱↻</div>
      <div class="rotateTitle">横向きプレイ推奨</div>
      <div class="rotateText">バトルは横持ちだと見やすく、操作しやすくなります。</div>
    </div>
  </div>
  <div id="battleScreen" class="app battleApp compact">
    <section class="panel battleMainPanel">
      <div class="battleArena">
        <div class="status battleHud">
          <div class="chip chipTurn" title="ターン">
            <span class="chipIcon" aria-hidden="true">⌛</span>
            <strong id="turn">1</strong>
          </div>
          <div class="chip chipPlayerHp" title="あなたHP">
            <span class="chipIcon" aria-hidden="true">🐱</span>
            <strong id="playerHp">20</strong>
          </div>
          <div class="chip chipEnemyHp" title="相手HP">
            <span class="chipIcon" aria-hidden="true">🐶</span>
            <strong id="enemyHp">20</strong>
          </div>
          <div class="chip chipPp" title="PP">
            <span class="chipIcon" aria-hidden="true">◆</span>
            <strong id="pp">1/1</strong>
          </div>
        </div>
        <div id="missionChip" class="chip missionChip" title="ミッション未設定">
          <span class="chipIcon" aria-hidden="true">✦</span>
          <strong id="missionText">-</strong>
        </div>
        <div id="resultBanner" class="resultBanner hidden" aria-live="polite">
          <strong id="resultMain">決着！</strong>
          <span id="resultSub">勝敗がここに表示されます</span>
        </div>

        <div class="leaderRow leaderTop">
          <div id="enemyLeaderAvatar" class="leaderCard enemyLeader targetLeader"></div>
        </div>

        <div class="board">
          <div class="lane enemyLane">
            <h3>相手の場 <span id="enemyHandCount" class="handCountBadge">手札 0</span></h3>
            <div id="enemyBoard"></div>
          </div>
          <div class="lane playerLane">
            <h3>あなたの場（最大4体）</h3>
            <div id="playerBoard"></div>
          </div>
        </div>

        <div class="leaderRow leaderBottom">
          <div id="playerLeaderAvatar" class="leaderCard playerLeader"></div>
        </div>

        <div class="lane handLane">
          <h3>手札</h3>
          <div id="hand" class="hand"></div>
        </div>

        <div id="cardInspect" class="cardInspect">
          <div id="inspectTitle" class="inspectTitle">カード詳細</div>
          <div id="inspectText" class="inspectText">カードの i ボタンで効果を確認できます。</div>
        </div>

        <div class="actions">
          <button id="endTurnBtn">ターン終了</button>
          <button id="resetBtn">戻る</button>
          <button id="logOpenBtn" class="mobileLogBtn" type="button">ログ</button>
        </div>
      </div>
    </section>

    <section class="panel battleLogPanel">
      <h1>Battle Log</h1>
      <div id="log" class="log"></div>
    </section>
  </div>

  <div id="logModal" class="logModal hidden">
    <div id="logModalBackdrop" class="logModalBackdrop"></div>
    <div class="logModalCard">
      <div class="logModalHeader">
        <h2>Battle Log</h2>
        <button id="logCloseBtn" type="button">閉じる</button>
      </div>
      <div id="logModalBody" class="log"></div>
    </div>
  </div>

  <script src="cards.js"></script>
  <script src="game.js"></script>
</body>
</html>
