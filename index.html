<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monverse Title</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="titleWrap">
    <section class="titlePanel">
      <p class="titleKicker">Pocket x Shadow Card Duel</p>

      <div class="titleStage">
        <div class="moonGlow"></div>
        <div class="kungfuCat" aria-label="kungfu cat">
          <div class="catHead">🐱</div>
          <div class="catBody"></div>
          <div class="paw pawLeft"></div>
          <div class="paw pawRight"></div>
          <div class="leg legLeft"></div>
          <div class="leg legRight"></div>
          <div class="tail"></div>
        </div>
      </div>

      <div class="titleActions">
        <a class="titleBtn" href="deck.html">デッキ構築へ</a>
      </div>
    </section>

</html>
