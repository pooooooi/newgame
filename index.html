<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monverse Title</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="pageTitle">
  <main class="titleWrap">
    <section class="titlePanel">
      <p class="titleKicker">Pocket Duel Arena</p>
      <h1 class="titleMain">MONVERSE</h1>
      <p class="titleSub">猫と犬のスピードバトル。手札を操り、進化で勝ち切れ。</p>

      <div class="titleStage">
        <div class="titleOrb titleOrbA"></div>
        <div class="titleOrb titleOrbB"></div>
        <div class="titleOrb titleOrbC"></div>
        <div class="versusStage">
          <article class="mascotCard catSide">
            <img src="assets/leader-cat.svg" alt="Cat Leader" />
            <span>CAT</span>
          </article>
          <div class="vsBadge">VS</div>
          <article class="mascotCard dogSide">
            <img src="assets/leader-dog.svg" alt="Dog Leader" />
            <span>DOG</span>
          </article>
        </div>
      </div>

      <div class="titleActions">
        <a class="titleBtn titleBtnPrimary" href="deck.html">デッキ構築へ</a>
        <p class="titleHint">最短30秒で構築して即バトル開始</p>
      </div>
    </section>
  </main>
</body>
</html>
